<script type="text/javascript" src="{{ ACE_URL }}/ace.js"></script>
{% if output_only %}
  <script type="text/javascript" src="{{ static('jszip/jszip.min.js') }}"></script>
{% endif %}
{{ form.media.js }}
<script type="text/javascript">
  function update_submit_area(code) {
    window.previous_template = code;
    $('textarea#id_source').val(code);
    window.ace_source.getSession().setValue(code);
  }

  function isOutputLanguage() {
    return $('#id_language').find('option:selected').attr('data-name') === 'Output';
  }

  function isFileOnlyLanguage() {
    var name = $('#id_language').find('option:selected').attr('data-name');
    return name === 'Output' || name === 'Scratch';
  }

  function update_language_template() {
    if (isFileOnlyLanguage()) {
      update_submit_area("");
      window.ace_source.env.editor.setReadOnly(true);
      $('#editor').hide();
      if (isOutputLanguage()) {
        $('#file-upload-hint').text("{{ _('Upload a .zip file or select multiple output files below.') }}");
        $('#id_source_file').attr('multiple', true).removeAttr('accept');
      } else {
        $('#file-upload-hint').text("{{ _('Upload your .sb3 file below.') }}");
        $('#id_source_file').removeAttr('multiple').attr('accept', '.sb3');
      }
      $('#output-only-upload').show();
    } else {
      window.ace_source.env.editor.setReadOnly(false);
      $('#editor').show();
      $('#output-only-upload').hide();
      $('#id_source_file').removeAttr('multiple').removeAttr('accept');
      var source = $('textarea#id_source');
      if (source.val() == window.previous_template.replace(/\r/g, '') || source.val() == '') {
        var lang_id = $('#id_language').val();
        var code = localStorage.getItem('submit:' + $('#id_language').val());

        if (code != null) {
          update_submit_area(code);
        } else {
          $.get('{{ url('language_template_ajax') }}', {
            id: lang_id,
            problem: {{problem_id}}
          }).done(function (template) {
            if (template && template.trim()) {
              update_submit_area(template);
            }
          });
        }
      }
    }
  }

  {% if request.in_contest and next_valid_submit_time and not (submission_limit and submissions_left <= 0) %}
    $(function () {
      const $submitButton = $("#submit-button");
      $submitButton.prop('disabled', true);
      const nextValidDate = new Date("{{next_valid_submit_time}}");

      function updateCountdown() {
        var now = new Date();
        var timeUntilNextValid = nextValidDate - now;

        if (timeUntilNextValid > 0) {
          var seconds = Math.floor(timeUntilNextValid / 1000);
          $("#countdown-timer").text("{{_("Wait")}} " + seconds + "s");
          setTimeout(updateCountdown, 1000);
        } else {
          $("#countdown-timer").text("");
          $submitButton.prop('disabled', false);
        }
      }
      updateCountdown();
    });
  {% endif %}
</script>

{% compress js %}
  <script type="text/javascript">
    $(function () {
      function format(state) {
        if (!state.id) return state.text; // optgroup
        return state.text;
      }

      window.previous_template = '';

      function makeDisplayData(data) {
        var site_data = data.attr('data-info');
        var judge_data = data.attr('data-judge-info');
        var display_data = site_data || judge_data;
        return display_data;
      }

      function formatSelection(state) {
        if (!state.id) return state.text; // optgroup
        var data = makeDisplayData($("option[data-id=" + state.id + "]"));
        return $('<span>').append($('<b>').text(state.text), ' (', data, ')');
      }

        // Terrible hack, adapted from https://github.com/select2/select2/issues/4436
      $.fn.select2.amd.define('select2/data/customAdapter', ['select2/results', 'select2/utils'], function (Result, Utils) {
        RefPresenter = function ($element, options, dataAdapter) {
          RefPresenter.__super__.constructor.call(this, $element, options, dataAdapter);
        };
        Utils.Extend(RefPresenter, Result);
        RefPresenter.prototype.bind = function (container, $container) {
          container.on('results:focus', function (params) {
            var data = makeDisplayData($("option[data-id=" + params.data.id + "]"));
            $("#result-version-info").text(data);
          });
          RefPresenter.__super__.bind.call(this, container, $container);
        };
        return RefPresenter;
      });

      var customAdapter = $.fn.select2.amd.require('select2/data/customAdapter');

      $("#id_language").select2({
        templateResult: format,
        templateSelection: formatSelection,
        resultsAdapter: customAdapter
      });

      $('#id_language').on('select2:open', function (evt) {
        var dropdown = $('.select2-dropdown');
        if (!$('#result-version-info').length)
          dropdown.append($("<span id=\"result-version-info\">"));
        dropdown.attr('id', 'language-select2');
      });

      $('#id_judge').on('select2:open', function (evt) {
        var dropdown = $('.select2-dropdown');
        $('#result-version-info').remove();
        dropdown.attr('id', 'judge-select2');
      });

      $('#id_language').change(function () {
        var lang = $("#id_language").find("option:selected").attr('data-ace');
        window.ace_source.getSession().setMode("ace/mode/" + lang);
        update_language_template();
      });

      $('#ace_source').on('ace_load', function (e, editor) {
        update_language_template();
        editor.commands.addCommand({
          name: 'save',
          bindKey: {win: 'Ctrl-S', mac: 'Command-S'},
          exec: function () {
            localStorage.setItem('submit:' + $('#id_language').val(), editor.getSession().getValue());
          }
        });
        editor.getSession().setUseWrapMode(true);
        editor.setFontSize(15);
        editor.setShowPrintMargin(false);
          // editor.setPrintMarginColumn(100);
        editor.focus();
      });

        // $(window).resize(function () {
        //     $('#ace_source').height(Math.max($(window).height() - 353, 100));
        // }).resize();

      $('#problem_submit').submit(function (event) {
        if ($('#id_source').val().length > 65536) {
          alert("{{ _('Your source code must contain at most 65536 characters.') }}");
          event.preventDefault();
          return;
        }
        if (isOutputLanguage()) {
          var fileInput = $('#id_source_file')[0];
          if (fileInput && fileInput.files.length > 0) {
            var files = fileInput.files;
            var needsZip = files.length > 1 || !files[0].name.endsWith('.zip');
            var fileResolved = needsZip ? new Promise(function (resolve) {
              var zip = new JSZip();
              for (var i = 0; i < files.length; i++) zip.file(files[i].name, files[i]);
              zip.generateAsync({type: 'blob'}).then(function (blob) {
                resolve(new File([blob], 'output.zip', {type: 'application/zip'}));
              });
            }) : Promise.resolve(files[0]);

            event.preventDefault();
            fileResolved.then(function (file) {
              var BIG = 10 * 1024 * 1024;
              if (file.size <= BIG) {
                  // Small file: use existing multipart path
                var dataTransfer = new DataTransfer();
                dataTransfer.items.add(file);
                fileInput.files = dataTransfer.files;
                $('#submit-button').prop('disabled', true).val("{{ _('Submitting...') }}");
                $('#problem_submit')[0].submit();
                return;
              }
                // Big file: presigned direct upload
              $('#submit-button').prop('disabled', true).val("{{ _('Uploading...') }}");
              var csrf = $('input[name=csrfmiddlewaretoken]').val();
              $.ajax({
                url: '/submission/upload-config',
                method: 'POST',
                contentType: 'application/json',
                headers: {'X-CSRFToken': csrf},
                data: JSON.stringify({
                  filename: file.name,
                  content_type: file.type || 'application/octet-stream',
                  file_size: file.size
                }),
                success: function (config) {
                  if (config.storage_type === 'local' || !config.upload_url) {
                      // Fall back to multipart (local storage backend)
                    var dataTransfer = new DataTransfer();
                    dataTransfer.items.add(file);
                    fileInput.files = dataTransfer.files;
                    $('#submit-button').val("{{ _('Submitting...') }}");
                    $('#problem_submit')[0].submit();
                    return;
                  }
                    // S3 path
                  var doUpload;
                  if (config.method === 'POST' && config.fields) {
                    var fd = new FormData();
                    Object.keys(config.fields).forEach(function (k) { fd.append(k, config.fields[k]); });
                    fd.append('file', file);
                    doUpload = fetch(config.upload_url, {method: 'POST', body: fd});
                  } else {
                    doUpload = fetch(config.upload_url, {
                      method: config.method || 'PUT',
                      body: file,
                      headers: {'Content-Type': file.type || 'application/octet-stream'}
                    });
                  }
                  doUpload.then(function (resp) {
                    if (!resp.ok) throw new Error('S3 upload failed: ' + resp.status);
                    $('<input>', {type: 'hidden', name: 'uploaded_file_key', value: config.file_key}).appendTo('#problem_submit');
                    fileInput.value = '';
                    $('#submit-button').val("{{ _('Submitting...') }}");
                    $('#problem_submit')[0].submit();
                  }).catch(function (err) {
                    $('#submit-button').prop('disabled', false).val("{{ _('Submit!') }}");
                    alert('{{ _("Upload failed") }}: ' + err.message);
                  });
                },
                error: function (xhr) {
                  $('#submit-button').prop('disabled', false).val("{{ _('Submit!') }}");
                  var msg = (xhr.responseJSON && xhr.responseJSON.error) || xhr.statusText;
                  alert('{{ _("Upload config failed") }}: ' + msg);
                }
              });
            });
            return;
          }
        }
        $('#submit-button').prop('disabled', true).val("{{ _('Submitting...') }}");
      });

      function get_source_default(file) {
        const reader = new FileReader();
        reader.readAsText(file);
        reader.onload = function (evt) {
          var src = evt.target.result;
          update_submit_area(src);
        }
        reader.onerror = function (evt) {
          alert("Fail to upload file");
        }
      }

      $('#id_source_file').on('click change', function(e) {
        var files = $(this)[0].files;
        if (files.length > 0) {
          if (isOutputLanguage()) {
            var names = [];
            for (var i = 0; i < files.length; i++) {
              names.push(files[i].name);
            }
            update_submit_area(names.join('\n'));
          } else {
            var file = files[0];
            if (file.name.endsWith('zip') || file.name.endsWith('sb3')) {
              update_submit_area(file.name);
            }
            else {
              get_source_default(file);
            }
          }
        }
      })
    });
  </script>
{% endcompress %}
